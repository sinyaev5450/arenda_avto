<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Состав семьи | MTA Province</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #d13030; }
        body { background-color: #1c1d21; color: white; }
        
        /* Лоадер */
        .loader {
            border: 3px solid #3b3e46;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- НАВИГАЦИОННЫЙ БЛОК -->
    <div class="max-w-6xl mx-auto mb-8">
        <header class="w-full bg-[#1c1d21]/95 backdrop-blur border-b border-[#3b3e46] sticky top-0 z-50 mb-8 rounded-lg">
            <div class="px-5 py-4 flex justify-between items-center">
                <a href="deville_family.html" class="flex items-center justify-center w-10 h-10 rounded-full bg-[#3b3e46] text-white font-bold no-underline">FAM</a>
                <ul class="flex gap-6 list-none m-0 p-0">
                    <li><a href="deville_family.html" class="text-[#a0a5b1] hover:text-white hover:bg-white/5 px-3 py-2 rounded-md transition no-underline">Домой</a></li>
                    <li><a href="pravila.html" class="text-[#a0a5b1] hover:text-white hover:bg-white/5 px-3 py-2 rounded-md transition no-underline">Правила семьи</a></li>
                    <li><a href="arenda_auto.html" class="text-[#a0a5b1] hover:text-white hover:bg-white/5 px-3 py-2 rounded-md transition no-underline">Аренда авто</a></li>
                    <li><a href="sostav.html" class="text-white bg-white/5 px-3 py-2 rounded-md transition no-underline font-medium">Состав семьи</a></li>
                </ul>
            </div>
        </header>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">Состав семьи</h1>
            <div class="flex items-center gap-4">
                <div id="loadingIndicator" class="hidden items-center gap-2 text-gray-400">
                    <span class="loader"></span> Обновление...
                </div>
                <button id="authBtn" class="bg-gray-700 hover:bg-gray-600 transition px-4 py-2 rounded">Войти как Админ</button>
                <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 transition px-4 py-2 rounded hidden">Выйти</button>
            </div>
        </header>

        <!-- ПАНЕЛЬ ФИЛЬТРОВ (видна всем) -->
        <div class="bg-[#282a30] p-4 rounded-lg border border-[#3b3e46] mb-6 flex flex-wrap gap-4">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-sm text-gray-400 mb-1">Поиск по нику</label>
                <input type="text" id="searchName" placeholder="Введите никнейм..." class="w-full bg-[#1c1d21] border border-[#3b3e46] rounded p-2 text-white transition focus:border-red-500 outline-none" oninput="renderTable()">
            </div>
            <div class="flex-1 min-w-[200px]">
                <label class="block text-sm text-gray-400 mb-1">Фильтр по роли</label>
                <select id="filterRole" class="w-full bg-[#1c1d21] border border-[#3b3e46] rounded p-2 text-white transition focus:border-red-500 outline-none" onchange="renderTable()">
                    <option value="">Все роли</option>
                    <option value="Администратор">Администратор</option>
                    <option value="Лидер">Лидер</option>
                    <option value="Заместитель">Заместитель</option>
                    <option value="Бюджет">Бюджет</option>
                    <option value="Основной состав">Основной состав</option>
                    <option value="Следящий за Т/С">Следящий за Т/С</option>
                    <option value="Повар">Повар</option>
                    <option value="Тестовый">Тестовый</option>
                    <option value="Отпуск">Отпуск</option>
                    <option value="Неактив">Неактив</option>
                </select>
            </div>
        </div>

        <!-- Форма добавления (видна только админу) -->
        <div id="addForm" class="bg-[#282a30] p-6 rounded-lg border border-[#3b3e46] mb-8 hidden">
            <h2 class="text-xl font-bold mb-4">Добавить участника</h2>
            <div class="flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm text-gray-400 mb-1">Никнейм</label>
                    <input type="text" id="newName" class="w-full bg-[#1c1d21] border border-[#3b3e46] rounded p-2 text-white" placeholder="Имя_Фамилия">
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm text-gray-400 mb-1">Роль</label>
                    <select id="newRole" class="w-full bg-[#1c1d21] border border-[#3b3e46] rounded p-2 text-white">
                        <option value="Администратор">Администратор</option>
                        <option value="Лидер">Лидер</option>
                        <option value="Заместитель">Заместитель</option>
                        <option value="Бюджет">Бюджет</option>
                        <option value="Основной состав" selected>Основной состав</option>
                        <option value="Следящий за Т/С">Следящий за Т/С</option>
                        <option value="Повар">Повар</option>
                        <option value="Тестовый">Тестовый</option>
                        <option value="Отпуск">Отпуск</option>
                        <option value="Неактив">Неактив</option>
                    </select>
                </div>
                <div>
                    <button onclick="addMember()" class="bg-[#d13030] hover:bg-red-700 transition px-6 py-2 rounded font-medium">Добавить</button>
                </div>
            </div>
        </div>

        <div class="bg-[#282a30] rounded-lg overflow-hidden border border-[#3b3e46] shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-black/20 text-gray-400 border-b border-[#3b3e46]">
                    <tr>
                        <th class="p-4 font-medium">Ник</th>
                        <th class="p-4 font-medium">Роль</th>
                        <th class="p-4 font-medium w-48">Выговоры</th>
                        <th class="p-4 font-medium admin-only hidden w-40">Действия</th>
                    </tr>
                </thead>
                <tbody id="memberList" class="divide-y divide-[#3b3e46]">
                    <tr>
                        <td colspan="4" class="p-8 text-center text-gray-500">Загрузка данных из Google Таблицы...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно редактирования -->
    <div id="editModal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-[100] backdrop-blur-sm transition-opacity">
        <div class="bg-[#282a30] p-6 rounded-lg border border-[#3b3e46] w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Редактировать участника</h2>
            <input type="hidden" id="editId">
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Никнейм</label>
                <input type="text" id="editName" class="w-full bg-[#1c1d21] border border-[#3b3e46] rounded p-2 text-white">
            </div>
            <div class="mb-6">
                <label class="block text-sm text-gray-400 mb-1">Роль</label>
                <select id="editRole" class="w-full bg-[#1c1d21] border border-[#3b3e46] rounded p-2 text-white">
                    <option value="Администратор">Администратор</option>
                    <option value="Лидер">Лидер</option>
                    <option value="Заместитель">Заместитель</option>
                    <option value="Бюджет">Бюджет</option>
                    <option value="Основной состав">Основной состав</option>
                    <option value="Следящий за Т/С">Следящий за Т/С</option>
                    <option value="Повар">Повар</option>
                    <option value="Тестовый">Тестовый</option>
                    <option value="Отпуск">Отпуск</option>
                    <option value="Неактив">Неактив</option>
                </select>
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeEditModal()" class="bg-gray-600 hover:bg-gray-500 transition px-4 py-2 rounded font-medium">Отмена</button>
                <button onclick="saveEdit()" class="bg-[#d13030] hover:bg-red-700 transition px-4 py-2 rounded font-medium">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // СЮДА НУЖНО ВСТАВИТЬ ССЫЛКУ ИЗ GOOGLE APPS SCRIPT
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzXSoBUq31Oc3oYt9g6E0P-XBlKKz9eI2L0NH0X_pNebCjxw9tiOct1ec5hyjjOZOSxiw/exec'; 
        
        let isAdmin = false;
        let membersData = [];

        // UI Элементы
        const tbody = document.getElementById('memberList');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Управление видимостью лоадера
        const showLoading = () => loadingIndicator.classList.remove('hidden');
        const hideLoading = () => loadingIndicator.classList.add('hidden');

        // Функция для красивых плашек ролей (овалы с фоном)
        function getRoleBadge(role) {
            const baseClass = "px-3 py-1 rounded-full text-[11px] uppercase font-bold inline-block tracking-wider shadow-sm ";
            switch (role) {
                case 'Администратор': return baseClass + "bg-orange-500 text-white";
                case 'Лидер': return baseClass + "bg-red-600 text-white";
                case 'Заместитель': return baseClass + "bg-purple-600 text-white";
                case 'Бюджет': return baseClass + "bg-teal-600 text-white";
                case 'Основной состав': return baseClass + "bg-emerald-600 text-white";
                case 'Следящий за Т/С': return baseClass + "bg-blue-600 text-white";
                case 'Повар': return baseClass + "bg-yellow-600 text-white";
                case 'Тестовый': return baseClass + "bg-gray-500 text-white";
                case 'Отпуск': return baseClass + "bg-sky-500 text-white";
                case 'Неактив': return baseClass + "bg-slate-700 text-white";
                default: return baseClass + "bg-[#3b3e46] text-gray-300";
            }
        }

        // Рендер таблицы с учетом фильтров
        window.renderTable = () => {
            tbody.innerHTML = '';
            
            const searchNameText = document.getElementById('searchName').value.toLowerCase();
            const filterRoleText = document.getElementById('filterRole').value;
            const isFiltered = searchNameText !== '' || filterRoleText !== ''; // Проверяем, включен ли фильтр

            // Применяем фильтры
            const filteredMembers = membersData.filter(member => {
                if(!member.id || !member.name) return false;
                const matchName = member.name.toLowerCase().includes(searchNameText);
                const matchRole = filterRoleText === '' || member.role === filterRoleText;
                return matchName && matchRole;
            });
            
            if (filteredMembers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500">${membersData.length === 0 ? 'Список пуст' : 'Участники не найдены'}</td></tr>`;
                return;
            }

            filteredMembers.forEach((member, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition";
                
                const isFirst = index === 0;
                const isLast = index === filteredMembers.length - 1;

                tr.innerHTML = `
                    <td class="p-4 font-medium text-[15px]">${member.name}</td>
                    <td class="p-4">
                        <span class="${getRoleBadge(member.role)}">${member.role}</span>
                    </td>
                    <td class="p-4">
                        <div class="flex items-center gap-1">
                            ${[...Array(6)].map((_, i) => `<div class="w-3 h-3 rounded-full ${i < member.warnings ? 'bg-[#d13030]' : 'bg-[#3b3e46]'}"></div>`).join('')}
                            ${isAdmin ? `
                                <div class="flex ml-3 gap-1">
                                    <button onclick="updateW('${member.id}', ${member.warnings}, -1)" class="w-6 h-6 flex justify-center items-center rounded bg-gray-700 hover:bg-gray-600 text-white font-bold transition">-</button>
                                    <button onclick="updateW('${member.id}', ${member.warnings}, 1)" class="w-6 h-6 flex justify-center items-center rounded bg-gray-700 hover:bg-gray-600 text-white font-bold transition">+</button>
                                </div>` : ''}
                        </div>
                    </td>
                    <td class="p-4 admin-only ${isAdmin ? '' : 'hidden'} align-middle">
                        <div class="flex items-center gap-4">
                            <div class="flex flex-col gap-2 items-start">
                                <button onclick="openEditModal('${member.id}', '${member.name}', '${member.role}')" class="text-blue-400 hover:text-blue-300 transition text-sm font-medium">Изменить</button>
                                <button onclick="deleteMember('${member.id}')" class="text-red-500 hover:text-red-400 transition text-sm font-medium">Удалить</button>
                            </div>
                            ${!isFiltered ? `
                            <div class="flex flex-col gap-1 border-l border-[#3b3e46] pl-4">
                                <button onclick="moveMember('${member.id}', 'up')" class="bg-gray-700 hover:bg-gray-500 transition w-7 h-6 rounded flex items-center justify-center text-xs ${isFirst ? 'opacity-30 cursor-not-allowed' : ''}" ${isFirst ? 'disabled' : ''}>▲</button>
                                <button onclick="moveMember('${member.id}', 'down')" class="bg-gray-700 hover:bg-gray-500 transition w-7 h-6 rounded flex items-center justify-center text-xs ${isLast ? 'opacity-30 cursor-not-allowed' : ''}" ${isLast ? 'disabled' : ''}>▼</button>
                            </div>
                            ` : ''}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Загрузка данных из Google Таблицы
        async function loadData() {
            if(SCRIPT_URL === 'ТВОЯ_ССЫЛКА_ВСТАВЛЯЕТСЯ_СЮДА') {
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500">Сначала укажи SCRIPT_URL в коде!</td></tr>';
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL);
                membersData = await response.json();
                renderTable();
            } catch (error) {
                console.error("Ошибка загрузки:", error);
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500">Ошибка загрузки данных. Проверьте ссылку скрипта.</td></tr>';
            }
        }

        // Отправка запроса в Google Таблицу
        async function sendRequest(payload) {
            showLoading();
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                await loadData(); // Перезагружаем данные
            } catch (error) {
                alert('Произошла ошибка при сохранении: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        // Перемещение участника
        window.moveMember = (id, direction) => {
            sendRequest({ action: 'move', id: id, direction: direction });
        };

        // --- ЛОГИКА РЕДАКТИРОВАНИЯ ---
        window.openEditModal = (id, currentName, currentRole) => {
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = currentName;
            document.getElementById('editRole').value = currentRole;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.closeEditModal = () => {
            document.getElementById('editModal').classList.add('hidden');
        };

        window.saveEdit = () => {
            const id = document.getElementById('editId').value;
            const newName = document.getElementById('editName').value.trim();
            const newRole = document.getElementById('editRole').value;

            if (!newName) return alert('Имя не может быть пустым!');

            closeEditModal();
            sendRequest({
                action: 'edit',
                id: id,
                name: newName,
                role: newRole
            });
        };

        // Изменение выговоров
        window.updateW = (id, currentWarnings, delta) => {
            const newVal = Math.max(0, Math.min(6, parseInt(currentWarnings) + delta));
            if (newVal === currentWarnings) return;
            sendRequest({ action: 'updateWarnings', id: id, warnings: newVal });
        };

        // Удаление участника
        window.deleteMember = (id) => {
            if (confirm('Точно удалить участника из таблицы?')) {
                sendRequest({ action: 'delete', id: id });
            }
        };

        // Добавление участника
        window.addMember = () => {
            const name = document.getElementById('newName').value.trim();
            const role = document.getElementById('newRole').value;
            
            if (!name) return alert('Введите никнейм!');
            
            const newId = 'id_' + Date.now();

            document.getElementById('newName').value = ''; 

            sendRequest({
                action: 'add',
                id: newId,
                name: name,
                role: role,
                warnings: 0
            });
        };

        // Логика Админ-панели
        document.getElementById('authBtn').onclick = () => {
            const pass = prompt('Введите пароль админа:');
            if (pass === 'JMoriartyDeville') { 
                isAdmin = true;
                document.getElementById('authBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('addForm').classList.remove('hidden');
                
                // Показываем скрытые заголовки админских колонок
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
                
                renderTable(); 
            } else {
                alert('Неверный пароль!');
            }
        };

        document.getElementById('logoutBtn').onclick = () => {
            isAdmin = false;
            document.getElementById('authBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('addForm').classList.add('hidden');
            
            // Скрываем заголовки админских колонок
            document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));

            renderTable(); 
        };

        // Инициализация
        loadData();
        setInterval(loadData, 30000); 
    </script>
</body>
</html>

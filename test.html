<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест Google Sheets</title>
</head>
<body>
    <h2>Тест связи с Google Sheets</h2>
    <button onclick="sendTest()">📤 Отправить тестовую заявку</button>
    <button onclick="loadTest()">📋 Загрузить заявки</button>
    <pre id="result" style="background:#1e1e1e; color:#fff; padding:10px; margin-top:20px;"></pre>

    <script>
        // ЗАМЕНИТЕ НА ВАШ URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/НОВЫЙ_ИД/exec';
        
        async function sendTest() {
            const testData = {
                action: 'add',
                id: Date.now().toString(),
                nickname: 'Тест_' + Math.floor(Math.random() * 1000),
                carBrand: 'Тестовая машина',
                carNumber: 'ТЕСТ777',
                takeTime: new Date().toLocaleString(),
                reason: 'Проверка связи',
                createdAt: new Date().toLocaleString()
            };
            
            document.getElementById('result').innerText = '⏳ Отправка...';
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                const result = await response.json();
                document.getElementById('result').innerText = JSON.stringify(result, null, 2);
                
                if (result.success) {
                    alert('✅ Заявка отправлена! Проверьте Google Таблицу.');
                    loadTest();
                }
            } catch(e) {
                document.getElementById('result').innerText = '❌ Ошибка: ' + e.message;
                console.error(e);
            }
        }
        
        async function loadTest() {
            document.getElementById('result').innerText = '⏳ Загрузка...';
            try {
                const response = await fetch(SCRIPT_URL + '?action=get', {
                    method: 'GET',
                    mode: 'cors'
                });
                const data = await response.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
                console.log('Загружено заявок:', data.length);
            } catch(e) {
                document.getElementById('result').innerText = '❌ Ошибка: ' + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест связи с Google Sheets</title>
</head>
<body>
    <h1>Тест отправки заявки в Google Sheets</h1>
    <button onclick="sendTest()">Отправить тестовую заявку</button>
    <button onclick="loadTest()">Загрузить заявки</button>
    <pre id="result"></pre>

    <script>
        // ВАШ URL (замените на правильный)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbymHFcdePwzJxBV4NK9F4KcYhaelYA9gMa1GCaJcWdSptO1BqPEK8q21WWsNheNai2osw/exec';
        
        async function sendTest() {
            const testData = {
                action: 'add',
                id: Date.now().toString(),
                nickname: 'Тестовый пользователь',
                carBrand: 'Тестовая машина',
                carNumber: 'ТЕСТ777',
                takeTime: new Date().toLocaleString(),
                reason: 'Тестовая заявка',
                createdAt: new Date().toLocaleString(),
                status: 'pending'
            };
            
            document.getElementById('result').innerText = 'Отправка...';
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                const result = await response.json();
                document.getElementById('result').innerText = JSON.stringify(result, null, 2);
                console.log('Результат:', result);
            } catch(e) {
                document.getElementById('result').innerText = 'Ошибка: ' + e.message;
                console.error(e);
            }
        }
        
        async function loadTest() {
            document.getElementById('result').innerText = 'Загрузка...';
            try {
                const response = await fetch(SCRIPT_URL + '?action=get', {
                    method: 'GET',
                    mode: 'cors'
                });
                const data = await response.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
                console.log('Загружено:', data);
            } catch(e) {
                document.getElementById('result').innerText = 'Ошибка: ' + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevilleCar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f1a;
            color: #eee;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #88aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            margin-bottom: 40px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .view-applications-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e88e5;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .view-applications-btn:hover {
            background: #0d5b9e;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .car-card {
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .car-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 30px rgba(0,0,0,0.4);
            border-color: #1e88e5;
        }

        .car-image {
            height: 200px;
            background: #1a1a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .car-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .car-card:hover .car-image img {
            transform: scale(1.03);
        }
        .car-image .no-image {
            color: #666;
            font-size: 0.9rem;
            text-align: center;
            padding: 20px;
        }

        .car-info {
            padding: 18px;
            flex: 1;
        }

        .car-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .car-desc {
            font-size: 0.85rem;
            color: #bbb;
            line-height: 1.4;
        }

        .car-spec {
            margin-top: 12px;
            font-size: 0.75rem;
            color: #88aaff;
            font-family: monospace;
        }

        .car-plate {
            margin-top: 8px;
            font-size: 0.8rem;
            background: #2a2a3a;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            color: #ffaa66;
            font-family: monospace;
            font-weight: bold;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            margin: 12px 18px 18px 18px;
        }
        .take-btn, .return-card-btn {
            flex: 1;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
            text-align: center;
        }
        .take-btn {
            background: #1e88e5;
        }
        .take-btn:hover {
            background: #0d5b9e;
        }
        .return-card-btn {
            background: #e67e22;
        }
        .return-card-btn:hover {
            background: #b45f1b;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #1a1a2e;
            margin: 5% auto;
            padding: 24px;
            border-radius: 28px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #88aaff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #eee;
        }
        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #ccc;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: #2a2a3a;
            border: 1px solid #445;
            border-radius: 16px;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #1e88e5;
        }
        .modal-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn {
            background: #1e88e5;
            color: white;
        }
        .cancel-btn {
            background: #444;
            color: white;
        }
        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
        }
        .close:hover {
            color: white;
        }

        .applications-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .applications-table th, .applications-table td {
            border: 1px solid #445;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        .applications-table th {
            background: #1e88e5;
            color: white;
        }
        .status-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-approve, .btn-reject {
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .btn-approve {
            background: #2ecc71;
        }
        .btn-approve:hover {
            background: #27ae60;
        }
        .btn-reject {
            background: #e67e22;
        }
        .btn-reject:hover {
            background: #d35400;
        }
        .status-text-approved {
            color: #6fcf97;
            font-weight: bold;
        }
        .status-text-rejected {
            color: #e74c3c;
            font-weight: bold;
        }
        .btn-return, .btn-delete {
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 0.8rem;
        }
        .btn-return {
            background: #3498db;
        }
        .btn-return:hover {
            background: #2980b9;
        }
        .btn-delete {
            background: #d32f2f;
        }
        .btn-delete:hover {
            background: #b71c1c;
        }
        .empty-apps {
            text-align: center;
            padding: 30px;
            color: #aaa;
        }
        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
    </style>
     <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
<div class="container">
      <h1>DevilleCar</h1>
    <div class="sub">Заявки на взятие и возврат ТС</div>
    <div class="cars-grid" id="carsGrid"></div>
</div>

<button class="view-applications-btn" id="viewAppsBtn">📋 Просмотр заявок</button>

<!-- Модалка анкеты -->
<div id="anketaModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2>📋 Анкета взятия транспорта</h2>
        <form id="anketaForm">
            <div class="form-group">
                <label>1. Ваш ник *</label>
                <input type="text" id="nickname" required placeholder="Введите никнейм">
            </div>
            <div class="form-group">
                <label>2. Время взятия</label>
                <input type="datetime-local" id="takeTime">
            </div>
            <div class="form-group">
                <label>3. Марка / модель</label>
                <input type="text" id="carBrand" readonly style="background:#333; cursor:default;">
            </div>
            <div class="form-group">
                <label>4. Номер ТС</label>
                <input type="text" id="carNumber" placeholder="например: А123ВС77">
            </div>
            <div class="form-group">
                <label>5. Причина взятия</label>
                <textarea id="reason" rows="3" placeholder="Для перевозки, тест-драйв, работа..."></textarea>
            </div>
            <div class="modal-buttons">
                <button type="button" class="cancel-btn" id="cancelModalBtn">Отмена</button>
                <button type="submit" class="submit-btn">Отправить заявку</button>
            </div>
        </form>
    </div>
</div>

<!-- Модалка со списком заявок -->
<div id="applicationsModal" class="modal">
    <div class="modal-content" style="max-width: 1200px;">
        <span class="close" id="closeAppsModal">&times;</span>
        <h2>📋 Все заявки на транспорт</h2>
        <div id="applicationsList"></div>
    </div>
</div>

<script>
    // ----- ФУНКЦИЯ ТРАНСЛИТЕРАЦИИ (русские буквы -> латиница) -----
    function transliterate(plate) {
        const map = {
            'А': 'A', 'В': 'B', 'Е': 'E', 'К': 'K', 'М': 'M',
            'Н': 'H', 'О': 'O', 'Р': 'P', 'С': 'C', 'Т': 'T',
            'У': 'U', 'Х': 'X', 'а': 'a', 'в': 'b', 'е': 'e',
            'к': 'k', 'м': 'm', 'н': 'h', 'о': 'o', 'р': 'p',
            'с': 'c', 'т': 't', 'у': 'u', 'х': 'x'
        };
        return plate.split('').map(char => map[char] || char).join('');
    }

    // ----- СПИСОК ТРАНСПОРТА -----
    const cars = [
        { name: "BMW X6 M (F86)", desc: "Спортивный кроссовер с twin-turbo V8, 575 л.с., полный привод M xDrive.", engine: "4.4 л V8 TwinPower Turbo", hp: 575, plate: "M666YP77" },
        { name: "Volvo XC90 T5", desc: "Роскошный 7-местный SUV с турбодвигателем и скандинавским дизайном.", engine: "2.0 л Drive-E Turbo", hp: 250, plate: "T550OK63" },
        { name: "Volvo V60 Polestar", desc: "Заряженный универсал с подвеской Öhlins, карбоновыми деталями.", engine: "2.0 л Twin Charged", hp: 367, plate: "E200TM78" },
        { name: "Volvo 850 R", desc: "Классический «кирпич» с 5-цилиндровым турбо, икона 90-х.", engine: "2.3 л R5 Turbo", hp: 250, plate: "T499MK78" },
        { name: "McLaren 720S Spyder", desc: "Суперкар с откидным верхом, карбоновый монокок, 710 л.с.", engine: "4.0 л V8 Twin-Turbo", hp: 710, plate: "M720AK78" },
        { name: "Porsche 911 Carrera (993) RWB <Slimer>", desc: "Легендарный RWB от Накаи-сан, широкие арки, аэродинамика.", engine: "3.6 л оппозитный 6", hp: 285, plate: "O993OO78" },
        { name: "Audi Rs7 (C8)", desc: "Быстрый лифтбек с 600-сильным V8 и полным приводом.", engine: "4.0 л V8 TFSI", hp: 600, plate: "T077YT77" },
        { name: "Jaguar F-Type", desc: "Британский спорткар с мощным V8 и элегантным звуком.", engine: "5.0 л V8 Supercharged", hp: 575, plate: "B_H" },
        { name: "Jaguar F-Type (на виниле)", desc: "Кастомная версия с ярким плёночным покрытием.", engine: "5.0 л V8", hp: 575, custom: "винил", plate: "M078YP78" },
        { name: "Mazda RX-8", desc: "Роторно-поршневой двигатель RENESIS, 1.3 л, 4-дверный купе.", engine: "1.3 л роторный", hp: 231, plate: "P008OO78" },
        { name: "Nissan Skyline GT-R V-specR34", desc: "Культовый Godzilla, ATTESA E-TS Pro, RB26DETT.", engine: "2.6 л Twin-Turbo I6", hp: 330, plate: "C888BB77" },
        { name: "Suzuki GSX 1300 R", desc: "Мотоцикл Hayabusa — легенда скорости, 1340 см³.", engine: "1340 cc", hp: 197, plate: "7777AE77" },
        { name: "BMW M760Li xDrive G12", desc: "Роскошный седан с V12 6.6 л, 610 л.с., потолок из алькантары.", engine: "6.6 л V12 Twin-Turbo", hp: 610, plate: "M760KA78" },
        { name: "Chevrolet Camaro ZL1", desc: "Американский мускул-кар с компрессорным V8.", engine: "6.2 л V8 Supercharged", hp: 650, plate: "B070OY77" },
        { name: "BMW X5 M", desc: "Высокопроизводительный SUV, M TwinPower V8, 600 л.с.", engine: "4.4 л V8 Twin-Turbo", hp: 600, plate: "M888AA78" },
        { name: "BMW S1000 RR", desc: "Спортбайк с рядной четвёркой, 205 л.с., электроника.", engine: "999 cc", hp: 205, plate: "0035MK63" },
        { name: "Volkswagen Touareg V8 TDI", desc: "Мощный дизельный внедорожник, 4.0 л V8, 421 л.с.", engine: "4.0 л V8 TDI", hp: 421, plate: "K657PY63" },
        { name: "Audi R8", desc: "Суперкар с двигателем V10 и полным приводом Quattro.", engine: "5.2 л V10", hp: 602, plate: "B546OK63" },
        { name: "Subaru WRX STI", desc: "Полноприводной седан с оппозитным турбо 2.5 л.", engine: "2.5 л Boxer Turbo", hp: 310, plate: "O403EB78" },
        { name: "BMW 535i (e34)", desc: "Классическая «пятёрка» с рядной шестёркой и драйвом.", engine: "3.5 л I6", hp: 211, plate: "O857KP63" },
        { name: "Mercedes-Maybach S680 (W223)", desc: "Бизнес сидан, хорошо управляемый и с хорошым разгоном", engine: "4 л", hp: 503, plate: "С303KP77" },
        { name: "Volvo FH", desc: "Магистральный тягач, экономичный дизель, автоматическая КПП.", engine: "12.8 л D13K", hp: 500, plate: "M888AA77" },
        { name: "Volvo FH", desc: "Магистральный тягач, кабина Globetrotter, мощный тормоз-замедлитель.", engine: "12.8 л D13K", hp: 500, plate: "P888MK77" },
        { name: "Volvo FH", desc: "Тягач для международных перевозок, низкий расход топлива.", engine: "12.8 л D13K", hp: 500, plate: "P888MK78" },
        { name: "Volvo FH", desc: "Тягач с улучшенной аэродинамикой и системой I-See.", engine: "12.8 л D13K", hp: 500, plate: "Y716TH63" },
        { name: "Volvo VNL", desc: "Американский дальнемагистральный тягач с высокой кабиной.", engine: "12.8 л D13", hp: 455, plate: "P479MK77" },
        { name: "Renault Magnum", desc: "Культовый «квадратный» тягач с просторной кабиной.", engine: "12.0 л DXi12", hp: 480, plate: "T562OE63" },
        { name: "Mercedes-Benz Sprinter", desc: "Универсальный коммерческий фургон, подходит для грузоперевозок.", engine: "3.0 л OM642", hp: 190, plate: "A942EB77" }
    ];

    // ----- ЗАЯВКИ И СТАТУСЫ -----
    let applications = [];

    function loadApplications() {
        const stored = localStorage.getItem('car_applications');
        applications = stored ? JSON.parse(stored) : [];
    }
    function saveApplications() {
        localStorage.setItem('car_applications', JSON.stringify(applications));
    }
    function addApplication(app) {
        app.id = Date.now();
        app.createdAt = new Date().toLocaleString();
        app.status = 'pending';
        applications.push(app);
        saveApplications();
    }
    function updateApplicationStatus(id, newStatus) {
        const index = applications.findIndex(app => app.id === id);
        if (index !== -1) { 
            applications[index].status = newStatus; 
            saveApplications(); 
        }
    }
    function deleteApplication(id) {
        applications = applications.filter(app => app.id !== id);
        saveApplications();
    }
    // Возврат транспорта: удаляем ВСЕ одобренные заявки с указанной маркой и номером
    function returnVehicleByModelAndPlate(modelName, plateNumber) {
        const toDelete = applications.filter(app => app.status === 'approved' && app.carBrand === modelName && app.carNumber === plateNumber);
        if (toDelete.length === 0) {
            alert(`❌ Нет одобренных заявок на ${modelName} (${plateNumber}). Возврат невозможен.`);
            return false;
        }
        if (confirm(`Возврат транспорта:\n${modelName} (${plateNumber})\nБудут удалены ${toDelete.length} одобренн${toDelete.length === 1 ? 'ая заявка' : 'ые заявки'}.\nПродолжить?`)) {
            applications = applications.filter(app => !(app.status === 'approved' && app.carBrand === modelName && app.carNumber === plateNumber));
            saveApplications();
            alert(`✅ Транспорт "${modelName}" (${plateNumber}) возвращён. Все одобренные заявки по этому ТС закрыты.`);
            return true;
        }
        return false;
    }

    // ---- ОТРИСОВКА ТАБЛИЦЫ ЗАЯВОК ----
    function renderApplicationsList() {
        const container = document.getElementById('applicationsList');
        if (!applications.length) {
            container.innerHTML = '<div class="empty-apps">📭 Пока нет ни одной заявки.</div>';
            return;
        }
        let html = `<table class="applications-table"><thead><tr>
            <th>Ник</th><th>Марка / модель</th><th>Номер ТС</th><th>Время взятия</th><th>Причина</th><th>Дата подачи</th><th>Статус</th><th>Действия</th>
        </tr></thead><tbody>`;
        
        applications.forEach(app => {
            html += `<tr>
                        <td>${escapeHtml(app.nickname)}</td>
                        <td>${escapeHtml(app.carBrand)}</td>
                        <td>${escapeHtml(app.carNumber)}</td>
                        <td>${escapeHtml(app.takeTime)}</td>
                        <td>${escapeHtml(app.reason)}</td>
                        <td>${escapeHtml(app.createdAt)}</td>
                        <td>`;
            
            if (app.status === 'pending') {
                html += `<div class="status-buttons">
                            <button class="btn-approve" data-id="${app.id}">✔ Одобрить</button>
                            <button class="btn-reject" data-id="${app.id}">✖ Отказать</button>
                        </div>`;
            } 
            else if (app.status === 'approved') {
                html += `<span class="status-text-approved">✅ Одобрено</span>`;
            } 
            else if (app.status === 'rejected') {
                html += `<span class="status-text-rejected">❌ Отказано</span>`;
            }
            
            html += `</td><td class="action-buttons">`;
            
            if (app.status === 'approved') {
                html += `<button class="btn-return" data-brand="${escapeHtml(app.carBrand)}" data-plate="${escapeHtml(app.carNumber)}">↩ Вернуть</button>`;
            }
            html += `<button class="btn-delete" data-id="${app.id}">🗑 Удалить</button>`;
            html += `</td></tr>`;
        });
        
        html += `</tbody></table>`;
        container.innerHTML = html;

        document.querySelectorAll('.btn-approve').forEach(btn => {
            btn.addEventListener('click', () => { 
                updateApplicationStatus(parseInt(btn.dataset.id), 'approved'); 
                renderApplicationsList(); 
            });
        });
        document.querySelectorAll('.btn-reject').forEach(btn => {
            btn.addEventListener('click', () => { 
                updateApplicationStatus(parseInt(btn.dataset.id), 'rejected'); 
                renderApplicationsList(); 
            });
        });
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', () => { 
                if(confirm('Удалить заявку?')) {
                    deleteApplication(parseInt(btn.dataset.id)); 
                    renderApplicationsList();
                }
            });
        });
        document.querySelectorAll('.btn-return').forEach(btn => {
            btn.addEventListener('click', () => {
                const brand = btn.dataset.brand;
                const plate = btn.dataset.plate;
                if (returnVehicleByModelAndPlate(brand, plate)) {
                    renderApplicationsList();
                }
            });
        });
    }

    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, function(m){ 
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }

  // ---- ГЕНЕРАЦИЯ КАРТОЧЕК ТРАНСПОРТА (С ФОТО, БЕЗ НАДПИСИ ПРИ ОШИБКЕ) ----
const grid = document.getElementById('carsGrid');

cars.forEach(car => {
    const card = document.createElement('div');
    card.className = 'car-card';
    
    // Формируем имя файла для фото
    let imageHtml = '';
    
    if (car.plate !== "Б/Н") {
        const imageFileName = transliterate(car.plate).toUpperCase().replace(/\s/g, '');
        const imagePath = `images/${imageFileName}.jpg`;
        // При ошибке загрузки — показываем пустой блок (без текста)
        imageHtml = `<img src="${imagePath}" alt="${car.name}" loading="lazy" onerror="this.style.display='none'; this.parentElement.style.background='#1a1a2a'">`;
    } else {
        // Для машин без номера — просто тёмный фон, без надписи
        imageHtml = `<div style="width:100%; height:100%; background:#1a1a2a;"></div>`;
    }
    
    card.innerHTML = `
        <div class="car-image">
            ${imageHtml}
        </div>
        <div class="car-info">
            <div class="car-name">${car.name}</div>
            <div class="car-desc">${car.desc.substring(0, 80)}${car.desc.length > 80 ? '…' : ''}</div>
            <div class="car-spec">${car.engine || ''} • ${car.hp ? car.hp + ' л.с.' : '—'}</div>
            <div class="car-plate">🚛 Госномер: ${car.plate}</div>
        </div>
        <div class="card-buttons">
            <button class="take-btn" data-car-name="${car.name}" data-car-plate="${car.plate}">📝 Взять в пользование</button>
            <button class="return-card-btn" data-car-name="${car.name}" data-car-plate="${car.plate}">↩ Вернуть транспорт</button>
        </div>
    `;
    grid.appendChild(card);
});

    // ---- МОДАЛКА АНКЕТЫ ----
    const modalAnketa = document.getElementById('anketaModal');
    const closeModalSpan = document.getElementById('closeModal');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const form = document.getElementById('anketaForm');
    const carBrandInput = document.getElementById('carBrand');
    const carNumberInput = document.getElementById('carNumber');
    let currentCarName = '', currentCarPlate = '';

    function openAnketaModal(carName, carPlate) {
        currentCarName = carName; 
        currentCarPlate = carPlate;
        carBrandInput.value = carName; 
        carNumberInput.value = carPlate;
        document.getElementById('nickname').value = ''; 
        document.getElementById('takeTime').value = ''; 
        document.getElementById('reason').value = '';
        const now = new Date(); 
        const year = now.getFullYear(); 
        const month = String(now.getMonth()+1).padStart(2,'0'); 
        const day = String(now.getDate()).padStart(2,'0'); 
        const hours = String(now.getHours()).padStart(2,'0'); 
        const minutes = String(now.getMinutes()).padStart(2,'0');
        document.getElementById('takeTime').value = `${year}-${month}-${day}T${hours}:${minutes}`;
        modalAnketa.style.display = 'block';
    }
    function closeAnketaModal() { modalAnketa.style.display = 'none'; }
    
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const nickname = document.getElementById('nickname').value.trim();
        if(!nickname) { alert('Укажите ник'); return; }
        const takeTime = document.getElementById('takeTime').value || 'не указано';
        const carNumber = document.getElementById('carNumber').value.trim() || 'не указан';
        const reason = document.getElementById('reason').value.trim() || 'не указана';
        addApplication({ nickname, takeTime, carBrand: currentCarName, carNumber, reason });
        alert(`✅ Заявка принята и ожидает одобрения!\nТранспорт: ${currentCarName}\nНик: ${nickname}\nВремя: ${takeTime}\nНомер: ${carNumber}`);
        closeAnketaModal();
    });
    
    closeModalSpan.onclick = closeAnketaModal;
    cancelModalBtn.onclick = closeAnketaModal;

    // ---- МОДАЛКА ЗАЯВОК ----
    const modalApps = document.getElementById('applicationsModal');
    const closeAppsSpan = document.getElementById('closeAppsModal');
    const viewAppsBtn = document.getElementById('viewAppsBtn');
    
    function openApplicationsModal() { 
        renderApplicationsList(); 
        modalApps.style.display = 'block'; 
    }
    function closeApplicationsModal() { modalApps.style.display = 'none'; }
    
    viewAppsBtn.addEventListener('click', openApplicationsModal);
    closeAppsSpan.onclick = closeApplicationsModal;
    window.onclick = function(event) { 
        if(event.target == modalAnketa) closeAnketaModal(); 
        if(event.target == modalApps) closeApplicationsModal(); 
    };

    // ---- ОБРАБОТЧИКИ КНОПОК НА КАРТОЧКАХ ----
    document.addEventListener('click', (e) => {
        if(e.target.classList.contains('take-btn')) {
            const carName = e.target.dataset.carName;
            const carPlate = e.target.dataset.carPlate;
            openAnketaModal(carName, carPlate);
        }
        if(e.target.classList.contains('return-card-btn')) {
            const carName = e.target.dataset.carName;
            const carPlate = e.target.dataset.carPlate;
            returnVehicleByModelAndPlate(carName, carPlate);
            renderApplicationsList();
        }
    });

    loadApplications();
</script>
</body>
</html>
    // ---- ЗАГРУЗКА ПРИ СТАРТЕ ----
    loadApplications();
</script>
</body>
</html>
